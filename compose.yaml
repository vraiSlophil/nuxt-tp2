services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
    ports:
      - "${NUXT_PORT}:${NUXT_PORT}"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.3-apache
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
    ports:
      - "${PHPMYADMIN_PORT}:80"
    volumes:
      - ./docker/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
      - ./docker/phpmyadmin/themes/boodark:/var/www/html/themes/boodark:ro

volumes:
  app_node_modules:
  mysql_data:
